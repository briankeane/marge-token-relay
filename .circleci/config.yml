version: 2.1

jobs:
  lint-and-test:
    docker:
      - image: cimg/node:20.17
    steps:
      - checkout
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "package-lock.json" }}
      - run: npm ci
      - save_cache:
          key: deps-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run:
          name: smoke test built server boots
          command: |
            BASE_URL=http://localhost:3000 KV_BACKEND=memory PORT=3000 node dist/server.js &
            SERVER_PID=$!
            sleep 2
            curl -fsS http://localhost:3000/healthz
            STATUS=$?
            kill $SERVER_PID
            exit $STATUS

workflows:
  ci:
    jobs:
      - lint-and-test
