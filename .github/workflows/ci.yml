name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - name: smoke test built server boots
        run: |
          BASE_URL=http://localhost:3000 KV_BACKEND=memory PORT=3000 node dist/server.js &
          SERVER_PID=$!
          sleep 2
          curl -fsS http://localhost:3000/healthz
          STATUS=$?
          kill $SERVER_PID
          exit $STATUS
